<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetailSmart Platform - Returns</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-wrapper">
    <!-- Sidebar Navigation -->
    <div class="app-sidebar">
      <div class="sidebar-header">
        <div class="brand-icon-box">
          <i class="bi bi-shop-window"></i>
        </div>
        <div class="sidebar-logo">Retail<span>Smart</span></div>
      </div>
      <ul class="sidebar-menu">
        <li class="sidebar-menu-item"><a href="dashboard.html"><i class="bi bi-grid-fill"></i> Dashboard</a></li>
        <li class="sidebar-menu-item"><a href="products.html"><i class="bi bi-box-seam-fill"></i> Products</a></li>
        <li class="sidebar-menu-item"><a href="inventory.html"><i class="bi bi-archive-fill"></i> Inventory</a></li>
        <li class="sidebar-menu-item"><a href="orders.html"><i class="bi bi-receipt-cutoff"></i> Orders</a></li>
        <li class="sidebar-menu-item"><a href="payments.html"><i class="bi bi-credit-card-fill"></i> Payments</a></li>
        <li class="sidebar-menu-item active"><a href="returns.html"><i class="bi bi-arrow-counterclockwise"></i> Returns</a></li>
        <li class="sidebar-menu-item"><a href="analytics.html"><i class="bi bi-bar-chart-line-fill"></i> Analytics</a></li>
        <li class="sidebar-menu-item"><a href="profile.html"><i class="bi bi-gear-fill"></i> Settings</a></li>
      </ul>
      <div class="sidebar-footer">
        <div class="seller-profile-snippet mb-3">
          <div class="seller-avatar" id="sidebar-seller-avatar">S</div>
          <div class="seller-info-text">
            <div class="seller-name-snippet" id="sidebar-seller-name">Loading...</div>
            <div class="seller-email-snippet" id="sidebar-seller-email">loading...</div>
          </div>
        </div>
        <button class="btn btn-outline-danger btn-sm w-100 py-2 d-flex align-items-center justify-content-center gap-2" onclick="handleLogout()">
          <i class="bi bi-box-arrow-right"></i> Log Out
        </button>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="app-content">
      <!-- Executive Top Bar -->
      <div class="app-topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-outline-light d-lg-none" onclick="toggleSidebar()"><i class="bi bi-list fs-5"></i></button>
          <div class="topbar-title-section">
            <h2>Return Ticket Approvals</h2>
            <p class="mb-0">Review product returns, authorization processing, and credit refunds</p>
          </div>
        </div>

        <button class="btn btn-premium" data-bs-toggle="modal" data-bs-target="#modal-create-return" onclick="loadDropdownsForReturnModal()">
          <i class="bi bi-arrow-counterclockwise"></i> Submit Return Ticket
        </button>
      </div>

      <!-- Tickets list -->
      <div id="returns-list" class="d-flex flex-column gap-4">
        <div class="text-center py-5 text-sub">
          <div class="spinner-border text-indigo mb-3" role="status" style="color:var(--accent-indigo);"></div>
          <div>Loading return tickets...</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Modal: Submit Return Ticket -->
  <div class="modal fade" id="modal-create-return" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content modal-content-premium text-main">
        <div class="modal-header modal-header-premium">
          <h5 class="modal-title fw-bold"><i class="bi bi-arrow-counterclockwise text-indigo me-2"></i>Submit Return Request Ticket</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="form-create-return" onsubmit="submitCreateReturn(event)">
          <div class="modal-body p-4">
            <div class="mb-3">
              <label for="ret-select-order" class="form-label small text-sub fw-semibold">Associated Order *</label>
              <select id="ret-select-order" class="form-select form-control-premium" required>
                <option value="">-- Choose Order --</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="ret-select-product" class="form-label small text-sub fw-semibold">Returned Product *</label>
              <select id="ret-select-product" class="form-select form-control-premium" required>
                <option value="">-- Choose Product --</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="ret-reason" class="form-label small text-sub fw-semibold">Reason for Return *</label>
              <textarea id="ret-reason" class="form-control form-control-premium" rows="3" placeholder="Provide customer return reason..." required></textarea>
            </div>
          </div>
          <div class="modal-footer modal-footer-premium">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-premium px-4">Submit Return</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div class="rs-toast-container"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Main utilities -->
  <script src="js/main.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetchReturns();
    });

    async function fetchReturns() {
      const token = localStorage.getItem('token');
      try {
        const response = await fetch(`${API_BASE_URL}/returns`, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const result = await response.json();
        const container = document.getElementById('returns-list');
        container.innerHTML = '';

        if (result.success) {
          if (result.returns.length > 0) {
            result.returns.forEach(ticket => {
              const card = document.createElement('div');
              card.className = 'rs-card mb-0';
              
              const dateStr = new Date(ticket.created_at).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute:'2-digit' });
              const ticketNum = `#RET-${ticket.id.substring(0, 8).toUpperCase()}`;
              const orderRef = `#ORD-${ticket.order_id.substring(0, 8).toUpperCase()}`;

              let actionsHtml = '';
              if (ticket.status === 'Pending') {
                actionsHtml = `
                  <button class="btn btn-premium btn-sm px-4" onclick="updateReturnStatus('${ticket.id}', 'Approved', 'Refunded')">Approve & Refund</button>
                  <button class="btn btn-outline-danger btn-sm px-4" onclick="updateReturnStatus('${ticket.id}', 'Rejected', 'Not Refunded')">Reject Request</button>
                `;
              } else {
                actionsHtml = `<span class="text-sub small">Ticket closed</span>`;
              }

              card.innerHTML = `
                <div class="rs-card-header py-3 px-4 d-flex justify-content-between align-items-center">
                  <div class="d-flex align-items-center gap-3">
                    <span class="fw-bold text-main fs-5" style="font-family:monospace;">${ticketNum}</span>
                    <span class="badge-status ${ticket.status.toLowerCase()}">${ticket.status}</span>
                  </div>
                  <div class="text-sub small">${dateStr}</div>
                </div>
                
                <div class="rs-card-body p-4">
                  <div class="row g-4 mb-4">
                    <div class="col-12 col-md-5">
                      <div class="text-sub small mb-2 fw-bold" style="letter-spacing:0.5px;">RETURNED PRODUCT</div>
                      <div class="d-flex align-items-center gap-3">
                        <img src="${ticket.image_url ? ticket.image_url : 'https://images.unsplash.com/photo-1531403009284-440f080d1e12?auto=format&fit=crop&w=80&q=80'}" alt="" class="product-img-thumbnail" style="width:48px; height:48px;">
                        <div>
                          <div class="fw-bold text-main">${ticket.product_name}</div>
                          <div class="text-sub small" style="font-family:monospace;">Order Ref: ${orderRef}</div>
                        </div>
                      </div>
                    </div>
                    
                    <div class="col-12 col-md-4">
                      <div class="text-sub small mb-2 fw-bold" style="letter-spacing:0.5px;">REFUND DISPOSITION</div>
                      <span class="badge-status ${ticket.refund_status.toLowerCase()}">${ticket.refund_status}</span>
                    </div>

                    <div class="col-12 col-md-3 text-md-end">
                      <div class="text-sub small mb-1 fw-bold" style="letter-spacing:0.5px;">REFUND VALUE</div>
                      <div class="fw-bold text-main fs-5">₹${ticket.product_price.toFixed(2)}</div>
                    </div>
                  </div>

                  <div class="p-3 rounded-3 mb-4 border bg-light">
                    <div class="text-sub small mb-1 fw-semibold"><i class="bi bi-chat-quote-fill text-indigo me-2"></i>Customer Explanation:</div>
                    <div class="small text-main" style="line-height:1.5;">${ticket.reason}</div>
                  </div>

                  <div class="d-flex justify-content-between align-items-center border-top pt-3">
                    <span class="text-sub small">Inspected return items must verify store guidelines</span>
                    <div class="d-flex gap-2">
                      ${actionsHtml}
                    </div>
                  </div>
                </div>
              `;
              container.appendChild(card);
            });
          } else {
            container.innerHTML = `
              <div class="rs-card py-5 text-center text-sub">
                <i class="bi bi-arrow-counterclockwise display-4 mb-3 d-block"></i>
                <h5 class="fw-bold text-main">No return requests</h5>
                <p class="small">Customers haven't submitted any return tickets for your products yet.</p>
              </div>
            `;
          }
        } else {
          showToast(result.message || 'Failed to fetch returns.', 'danger');
        }
      } catch (error) {
        console.error('Fetch returns error:', error);
        showToast('Error syncing return requests.', 'danger');
      }
    }

    async function loadDropdownsForReturnModal() {
      const token = localStorage.getItem('token');
      const orderSelect = document.getElementById('ret-select-order');
      const prodSelect = document.getElementById('ret-select-product');

      orderSelect.innerHTML = '<option value="">-- Choose Order --</option>';
      prodSelect.innerHTML = '<option value="">-- Choose Product --</option>';

      try {
        const [ordersRes, prodsRes] = await Promise.all([
          fetch(`${API_BASE_URL}/orders`, { headers: { 'Authorization': `Bearer ${token}` } }),
          fetch(`${API_BASE_URL}/products`, { headers: { 'Authorization': `Bearer ${token}` } })
        ]);

        const ordersData = await ordersRes.json();
        const prodsData = await prodsRes.json();

        if (ordersData.success) {
          ordersData.orders.forEach(o => {
            const opt = document.createElement('option');
            opt.value = o.id;
            opt.textContent = `#ORD-${o.id.substring(0, 8).toUpperCase()} (${o.customer_name})`;
            orderSelect.appendChild(opt);
          });
        }

        if (prodsData.success) {
          prodsData.products.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = p.name;
            prodSelect.appendChild(opt);
          });
        }
      } catch (err) {
        console.error('Error loading dropdowns:', err);
      }
    }

    async function submitCreateReturn(e) {
      e.preventDefault();
      const token = localStorage.getItem('token');

      const order_id = document.getElementById('ret-select-order').value;
      const product_id = document.getElementById('ret-select-product').value;
      const reason = document.getElementById('ret-reason').value.trim();

      try {
        const response = await fetch(`${API_BASE_URL}/returns`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ order_id, product_id, reason })
        });

        const result = await response.json();
        if (result.success) {
          showToast('Return request ticket created successfully!', 'success');
          bootstrap.Modal.getInstance(document.getElementById('modal-create-return')).hide();
          document.getElementById('form-create-return').reset();
          fetchReturns();
        } else {
          showToast(result.message || 'Failed to submit return request.', 'danger');
        }
      } catch (err) {
        console.error('Create return error:', err);
        showToast('Error creating return request.', 'danger');
      }
    }

    async function updateReturnStatus(ticketId, status, refundStatus) {
      const token = localStorage.getItem('token');
      try {
        const response = await fetch(`${API_BASE_URL}/returns/${ticketId}/status`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            status: status,
            refund_status: refundStatus
          })
        });

        const result = await response.json();
        if (result.success) {
          showToast(`Return ticket status updated to '${status}' successfully.`, 'success');
          fetchReturns();
        } else {
          showToast(result.message || 'Failed to update return request.', 'danger');
        }
      } catch (error) {
        console.error('Update status error:', error);
        showToast('Error sending status updates.', 'danger');
      }
    }
  </script>
</body>
</html>
