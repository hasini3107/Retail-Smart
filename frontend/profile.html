<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetailSmart Platform - Settings</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-wrapper">
    <!-- Sidebar Navigation -->
    <div class="app-sidebar">
      <div class="sidebar-header">
        <div class="brand-icon-box">
          <i class="bi bi-shop-window"></i>
        </div>
        <div class="sidebar-logo">Retail<span>Smart</span></div>
      </div>
      <ul class="sidebar-menu">
        <li class="sidebar-menu-item"><a href="dashboard.html"><i class="bi bi-grid-fill"></i> Dashboard</a></li>
        <li class="sidebar-menu-item"><a href="products.html"><i class="bi bi-box-seam-fill"></i> Products</a></li>
        <li class="sidebar-menu-item"><a href="inventory.html"><i class="bi bi-archive-fill"></i> Inventory</a></li>
        <li class="sidebar-menu-item"><a href="orders.html"><i class="bi bi-receipt-cutoff"></i> Orders</a></li>
        <li class="sidebar-menu-item"><a href="payments.html"><i class="bi bi-credit-card-fill"></i> Payments</a></li>
        <li class="sidebar-menu-item"><a href="returns.html"><i class="bi bi-arrow-counterclockwise"></i> Returns</a></li>
        <li class="sidebar-menu-item"><a href="analytics.html"><i class="bi bi-bar-chart-line-fill"></i> Analytics</a></li>
        <li class="sidebar-menu-item active"><a href="profile.html"><i class="bi bi-gear-fill"></i> Settings</a></li>
      </ul>
      <div class="sidebar-footer">
        <div class="seller-profile-snippet mb-3">
          <div class="seller-avatar" id="sidebar-seller-avatar">S</div>
          <div class="seller-info-text">
            <div class="seller-name-snippet" id="sidebar-seller-name">Loading...</div>
            <div class="seller-email-snippet" id="sidebar-seller-email">loading...</div>
          </div>
        </div>
        <button class="btn btn-outline-danger btn-sm w-100 py-2 d-flex align-items-center justify-content-center gap-2" onclick="handleLogout()">
          <i class="bi bi-box-arrow-right"></i> Log Out
        </button>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="app-content">
      <!-- Executive Top Bar -->
      <div class="app-topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-outline-light d-lg-none" onclick="toggleSidebar()"><i class="bi bi-list fs-5"></i></button>
          <div class="topbar-title-section">
            <h2>Account Profile & Settings</h2>
            <p class="mb-0">Manage store parameters and security credentials</p>
          </div>
        </div>
      </div>

      <div class="row g-4 mb-0">
        <!-- Profile details -->
        <div class="col-12 col-xl-6">
          <div class="rs-card mb-0">
            <div class="rs-card-header">
              <span class="rs-card-title"><i class="bi bi-briefcase-fill text-indigo"></i> Store Profile</span>
            </div>
            <div class="rs-card-body p-4">
              <form id="form-profile-settings" onsubmit="saveProfileSettings(event)">
                <div class="mb-3">
                  <label for="profile-business-name" class="form-label small text-sub fw-semibold">Business Name</label>
                  <input type="text" id="profile-business-name" class="form-control form-control-premium" required>
                </div>
                <div class="mb-3">
                  <label for="profile-email" class="form-label small text-sub fw-semibold">Registered Email Address</label>
                  <input type="email" id="profile-email" class="form-control form-control-premium text-muted" readonly disabled>
                </div>
                <div class="mb-4">
                  <label for="profile-joined" class="form-label small text-sub fw-semibold">Member Since</label>
                  <input type="text" id="profile-joined" class="form-control form-control-premium text-muted" readonly disabled>
                </div>
                <button type="submit" class="btn btn-premium px-4 py-2">Save Store Details</button>
              </form>
            </div>
          </div>
        </div>

        <!-- Password credentials change -->
        <div class="col-12 col-xl-6">
          <div class="rs-card mb-0">
            <div class="rs-card-header">
              <span class="rs-card-title text-rose" style="color:var(--accent-rose);"><i class="bi bi-shield-lock-fill me-2"></i>Security Credentials</span>
            </div>
            <div class="rs-card-body p-4">
              <form id="form-security-settings" onsubmit="saveSecuritySettings(event)">
                <div class="mb-3">
                  <label for="sec-current-pass" class="form-label small text-sub fw-semibold">Current Password *</label>
                  <input type="password" id="sec-current-pass" class="form-control form-control-premium" placeholder="••••••••" required>
                </div>
                <div class="mb-3">
                  <label for="sec-new-pass" class="form-label small text-sub fw-semibold">New Password *</label>
                  <input type="password" id="sec-new-pass" class="form-control form-control-premium" placeholder="••••••••" required>
                </div>
                <div class="mb-4">
                  <label for="sec-confirm-pass" class="form-label small text-sub fw-semibold">Confirm New Password *</label>
                  <input type="password" id="sec-confirm-pass" class="form-control form-control-premium" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-outline-premium px-4 py-2">Change Password</button>
              </form>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Toasts -->
  <div class="rs-toast-container"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Main utilities -->
  <script src="js/main.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadProfileFields();
    });

    async function loadProfileFields() {
      const token = localStorage.getItem('token');
      try {
        const response = await fetch(`${API_BASE_URL}/auth/profile`, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const result = await response.json();
        if (result.success) {
          const seller = result.seller;
          document.getElementById('profile-business-name').value = seller.business_name;
          document.getElementById('profile-email').value = seller.email;
          
          const joinedDate = seller.created_at ? new Date(seller.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : 'N/A';
          document.getElementById('profile-joined').value = joinedDate;
        }
      } catch (error) {
        console.error('Error loading profile fields:', error);
        document.getElementById('profile-business-name').value = localStorage.getItem('seller_business') || '';
        document.getElementById('profile-email').value = localStorage.getItem('seller_email') || '';
      }
    }

    function saveProfileSettings(e) {
      e.preventDefault();
      const updatedName = document.getElementById('profile-business-name').value.trim();
      
      localStorage.setItem('seller_business', updatedName);
      updateSidebarProfile(updatedName, localStorage.getItem('seller_email'));
      
      showToast('Store profile details updated successfully.', 'success');
    }

    function saveSecuritySettings(e) {
      e.preventDefault();
      const newPass = document.getElementById('sec-new-pass').value;
      const confirmPass = document.getElementById('sec-confirm-pass').value;

      if (newPass !== confirmPass) {
        showToast('New password confirmation does not match.', 'danger');
        return;
      }

      showToast('Password credentials changed successfully.', 'success');
      document.getElementById('form-security-settings').reset();
    }
  </script>
</body>
</html>
